<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#000000">
  <title>自我内在观察</title>
  <style>
    /* ============ CSS Variables ============ */
    :root {
      --color-bg: #F5F5F7;
      --color-surface: rgba(255, 255, 255, 0.8);
      --color-surface-hover: rgba(255, 255, 255, 0.95);
      --color-text: #1D1D1F;
      --color-text-secondary: #6E6E73;
      --color-text-tertiary: #AEAEB2;
      --color-accent: #0071E3;
      --color-accent-2: #5856D6;
      --color-border: rgba(0, 0, 0, 0.08);
      --color-shadow: rgba(0, 0, 0, 0.06);
      --color-gradient-1: #007AFF;
      --color-gradient-2: #5856D6;
      --color-gradient-3: #AF52DE;
      --color-gradient-4: #FF2D55;
      --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text',
        'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      --radius-card: 20px;
      --radius-button: 9999px;
      --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    [data-theme="dark"] {
      --color-bg: #000000;
      --color-surface: rgba(255, 255, 255, 0.06);
      --color-surface-hover: rgba(255, 255, 255, 0.1);
      --color-text: #F5F5F7;
      --color-text-secondary: #A1A1A6;
      --color-text-tertiary: #636366;
      --color-accent: #0A84FF;
      --color-accent-2: #5E5CE6;
      --color-border: rgba(255, 255, 255, 0.12);
      --color-shadow: rgba(0, 0, 0, 0.3);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-bg: #000000;
        --color-surface: rgba(255, 255, 255, 0.06);
        --color-surface-hover: rgba(255, 255, 255, 0.1);
        --color-text: #F5F5F7;
        --color-text-secondary: #A1A1A6;
        --color-text-tertiary: #636366;
        --color-accent: #0A84FF;
        --color-accent-2: #5E5CE6;
        --color-border: rgba(255, 255, 255, 0.12);
        --color-shadow: rgba(0, 0, 0, 0.3);
      }
    }

    /* ============ Reset & Base ============ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.3s ease, color 0.3s ease;
      line-height: 1.5;
    }

    .container {
      width: 100%;
      max-width: 720px;
      padding: 24px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ============ Top Bar ============ */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--color-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text);
      transition: var(--transition);
    }

    .theme-toggle:hover {
      background: var(--color-surface-hover);
      transform: scale(1.05);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }

    /* ============ Hero ============ */
    .hero {
      text-align: center;
      padding: 48px 0 12px;
      animation: fadeInUp 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--color-gradient-1), var(--color-gradient-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 18px;
      color: var(--color-text-secondary);
      line-height: 1.6;
      max-width: 440px;
      margin: 0 auto;
    }

    /* ============ Cards ============ */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--color-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      padding: 28px 24px;
      transition: var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s cubic-bezier(0.25, 0.1, 0.25, 1) both;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }

    .card:hover {
      background: var(--color-surface-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--color-shadow);
    }

    .card:active {
      transform: scale(0.98);
    }

    .card-accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
    }

    .card:nth-child(1) .card-accent {
      background: linear-gradient(90deg, var(--color-gradient-1), var(--color-gradient-2));
    }

    .card:nth-child(2) .card-accent {
      background: linear-gradient(90deg, var(--color-gradient-3), var(--color-gradient-4));
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
    }

    .card:nth-child(1) .card-icon {
      background: rgba(0, 122, 255, 0.12);
      color: var(--color-gradient-1);
    }

    .card:nth-child(2) .card-icon {
      background: rgba(175, 82, 222, 0.12);
      color: var(--color-gradient-3);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .card h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card-arrow {
      font-size: 18px;
      color: var(--color-text-tertiary);
      transition: var(--transition);
    }

    .card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--color-accent);
    }

    .card-desc {
      font-size: 15px;
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .card-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .meta-tag {
      font-size: 13px;
      color: var(--color-text-tertiary);
      background: var(--color-bg);
      border-radius: 9999px;
      padding: 4px 12px;
    }

    /* ============ Footer ============ */
    .footer {
      text-align: center;
      padding: 24px 0;
      color: var(--color-text-tertiary);
      font-size: 13px;
      animation: fadeInUp 0.6s cubic-bezier(0.25, 0.1, 0.25, 1) 0.3s both;
    }

    /* ============ Animations ============ */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============ Responsive ============ */
    @media (max-width: 480px) {
      .hero {
        padding: 24px 0 8px;
      }
      .hero h1 {
        font-size: 28px;
      }
      .hero p {
        font-size: 16px;
      }
      .card {
        padding: 22px 18px;
      }
      .card h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
      <div></div>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        ☀️
      </button>
    </div>

    <!-- Hero -->
    <header class="hero">
      <h1>自我内在观察</h1>
      <p>探索你的性格密码，发现内在力量。选择一份测评，开启自我认知之旅。</p>
    </header>

    <!-- Questionnaire Cards -->
    <nav class="cards">
      <!-- MBTI 卡片 -->
      <a href="mbti/index.html" class="card">
        <div class="card-accent"></div>
        <div class="card-icon">🧩</div>
        <div class="card-header">
          <h2>MBTI 性格测试</h2>
          <span class="card-arrow">→</span>
        </div>
        <p class="card-desc">
          基于荣格心理类型理论，通过 28 道题目测出你的 16 型人格，
          深入了解你的性格特质、优劣势与职业倾向。
        </p>
        <div class="card-meta">
          <span class="meta-tag">28 题</span>
          <span class="meta-tag">约 5 分钟</span>
          <span class="meta-tag">16 种人格类型</span>
        </div>
      </a>

      <!-- 内在力量 卡片 -->
      <a href="inner_power/inner_power.html" class="card">
        <div class="card-accent"></div>
        <div class="card-icon">🌱</div>
        <div class="card-header">
          <h2>自我成长与内在力量评估</h2>
          <span class="card-arrow">→</span>
        </div>
        <p class="card-desc">
          衡量你的自我独立性与心理成熟度，从四个维度分析内在力量，
          提供个性化的成长建议与哲思箴言。
        </p>
        <div class="card-meta">
          <span class="meta-tag">12 题</span>
          <span class="meta-tag">约 3 分钟</span>
          <span class="meta-tag">4 个评估维度</span>
        </div>
      </a>
    </nav>

    <!-- Footer -->
    <footer class="footer">
      结果仅供参考，不能替代专业心理诊断
    </footer>
  </div>

  <script>
    (function () {
      // ========== Theme Management ==========
      const STORAGE_KEY = 'mbti_inner_theme';

      function getSavedTheme () {
        try {
          return localStorage.getItem(STORAGE_KEY);
        } catch (e) {
          return null;
        }
      }

      function applyTheme (theme) {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.querySelector('meta[name="theme-color"]')
            .setAttribute('content', '#000000');
          updateToggleIcon(true);
        } else if (theme === 'light') {
          document.documentElement.removeAttribute('data-theme');
          document.querySelector('meta[name="theme-color"]')
            .setAttribute('content', '#F5F5F7');
          updateToggleIcon(false);
        } else {
          // auto — remove attribute, let prefers-color-scheme media query handle it
          document.documentElement.removeAttribute('data-theme');
          const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.querySelector('meta[name="theme-color"]')
            .setAttribute('content', isDark ? '#000000' : '#F5F5F7');
          updateToggleIcon(isDark);
        }
      }

      function updateToggleIcon (isDark) {
        const btn = document.getElementById('themeToggle');
        if (!btn) return;
        btn.textContent = isDark ? '☀️' : '🌙';
      }

      function toggleTheme () {
        const current = document.documentElement.getAttribute('data-theme');
        let next;
        if (!current) {
          // auto → force opposite of system preference
          const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          next = isDark ? 'light' : 'dark';
        } else if (current === 'dark') {
          next = 'light';
        } else {
          next = 'dark';
        }
        try {
          localStorage.setItem(STORAGE_KEY, next);
        } catch (e) {}
        applyTheme(next);
      }

      // Listen for system theme changes when in auto mode
      window.matchMedia('(prefers-color-scheme: dark)')
        .addEventListener('change', function (e) {
          // re-apply if no explicit theme is saved
          if (!getSavedTheme()) {
            applyTheme(null);
          }
        });

      // Initialize — default to dark mode
      const saved = getSavedTheme();
      if (saved) {
        applyTheme(saved);
      } else {
        applyTheme('dark');
      }

      // Bind toggle
      document.getElementById('themeToggle').addEventListener('click', toggleTheme);

      // Persist theme choice to other projects via localStorage
      // Use the same key convention — each project reads their own, but
      // we broadcast the change so sub-projects can pick it up.
      const broadcastKeys = ['mbti_theme', 'inner_power_theme'];
      broadcastKeys.forEach(function (key) {
        try {
          if (!localStorage.getItem(key)) {
            localStorage.setItem(key, saved || 'dark');
          }
        } catch (e) {}
      });
    })();
  </script>
</body>
</html>
