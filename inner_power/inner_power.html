<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>自我成长与内在力量评估</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="nav-bar">
        <div class="nav-content">
            <span class="nav-title" id="navTitle">问卷评估</span>
            <div class="nav-actions">
                <div class="segmented-control">
                    <button class="segment-btn active" onclick="setLang('zh')">简体</button>
                    <button class="segment-btn" onclick="setLang('tw')">繁體</button>
                    <button class="segment-btn" onclick="setLang('en')">EN</button>
                </div>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <!-- Hero Header -->
        <header class="hero">
            <h1 class="hero-title" id="mainTitle">自我成长与<br>内在力量评估</h1>
            <p class="hero-subtitle" id="subtitle">本问卷旨在帮助您觉察自我独立性与心理成熟度，共12题。请根据近半年来的真实感受作答。</p>
        </header>

        <!-- Info Card -->
        <div class="info-card">
            <h2 class="info-card-title" id="scaleTitle">计分说明</h2>
            <p class="info-card-desc" id="scaleDesc">请根据自身情况，选择符合程度的分值：</p>
            <div class="scale-row">
                <div class="scale-item"><div class="scale-badge">1</div><div class="scale-label" data-i18n="s1">完全不符合</div></div>
                <div class="scale-item"><div class="scale-badge">2</div><div class="scale-label" data-i18n="s2">较不符合</div></div>
                <div class="scale-item"><div class="scale-badge">3</div><div class="scale-label" data-i18n="s3">不确定/偶尔</div></div>
                <div class="scale-item"><div class="scale-badge">4</div><div class="scale-label" data-i18n="s4">较符合</div></div>
                <div class="scale-item"><div class="scale-badge">5</div><div class="scale-label" data-i18n="s5">完全符合</div></div>
            </div>
        </div>

        <!-- Quiz Section -->
        <div id="quizSection">
            <!-- Progress -->
            <div class="progress-section">
                <div class="progress-header">
                    <span class="progress-label" id="progressText">0 / 12</span>
                </div>
                <div class="progress-track">
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
            </div>

            <!-- Question Navigation -->
            <div class="question-nav" id="questionNav"></div>

            <!-- Question Cards (dynamically generated) -->
            <div class="question-container" id="quizForm"></div>
        </div>

        <!-- Result Section -->
        <div id="resultSection" class="result-container">
            <div class="result-hero">
                <div class="result-score-value" id="scoreDisplay">0</div>
                <div class="result-score-label" id="scoreLabel">/ 60</div>
            </div>

            <div style="text-align: center;">
                <div class="result-level" id="levelDisplay">计算中...</div>
            </div>

            <h3 class="result-section-title" id="dimensionTitle">内在力量维度剖析</h3>
            <div class="dimension-grid" id="dimensionGrid"></div>

            <div id="adviceContainer"></div>

            <div class="result-actions">
                <button class="btn btn-primary" onclick="resetQuiz()" id="resetBtn">重新评估</button>
            </div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script src="js/translations.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
